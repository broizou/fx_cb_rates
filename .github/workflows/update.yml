name: Weekly WIRP Data Update

on:
  schedule:
    - cron: '0 6 * * 6'   # Every Saturday at 06:00 UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

permissions:
  contents: write           # Needed to commit wirp.html back to the repo

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 openpyxl websocket-client tzdata

      - name: Run update_data.py
        run: python update_data.py

      - name: Commit and push updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add wirp.html wirp_data.json wirp_history.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: weekly data update $(date -u '+%Y-%m-%d')"

          # Push with up to 3 rebase retries to handle concurrent commits
          for i in 1 2 3; do
            git push && break
            echo "Push attempt $i failed — rebasing and retrying..."
            git pull --rebase origin main
          done
