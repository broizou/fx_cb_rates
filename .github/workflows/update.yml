name: Weekly WIRP Data Update

on:
  schedule:
    - cron: '0 6 * * 6'   # Every Saturday at 06:00 UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

permissions:
  contents: write           # Needed to commit wirp.html back to the repo

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Pull latest changes
        run: git pull --rebase origin main

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 openpyxl websocket-client

      - name: Run update_data.py
        run: python update_data.py

      - name: Commit and push updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wirp.html wirp_data.json wirp_history.json
          git diff --cached --quiet || git commit -m "chore: weekly data update $(date -u '+%Y-%m-%d')"
          for i in 1 2 3; do
            git push && break
            echo "Push attempt $i failed, pulling and retrying..."
            git pull --rebase origin main
          done
